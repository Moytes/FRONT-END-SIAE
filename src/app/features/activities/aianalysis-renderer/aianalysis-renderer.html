<!-- Tema Naranja para Morfosintaxis -->
<div class="renderer-container bg-orange-50">
  <header class="renderer-header">
    <h2 class="title">{{ config()?.title || 'Análisis de Producción Espontánea' }}</h2>
    <span class="badge">Motor IA</span>
  </header>
  
  <div class="renderer-content">
    <!-- Input Principal -->
    <div class="input-panel">
      <p class="instruction">Transcribe lo que el alumno expone durante el juego libre o la descripción de la lámina:</p>
      <textarea 
        [(ngModel)]="transcription" 
        placeholder="Ejemplo: 'E-el pe-perro e-tá co-co-miendo...'"
        class="ia-textarea">
      </textarea>

      <div class="analysis-actions">
        <button class="analyze-btn" (click)="triggerAnalysis()" [disabled]="isAnalyzing()">
          <svg *ngIf="!isAnalyzing()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          <svg *ngIf="isAnalyzing()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" class="spinner" stroke="currentColor" stroke-width="2"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
          {{ isAnalyzing() ? 'Procesando Muestra...' : 'Analizar Muestra Morfosintáctica' }}
        </button>
      </div>

      <!-- Resultados IA Mock -->
      <div class="ai-results" *ngIf="analysisResult()">
         <h4 class="res-title">Hallazgos Estructurales</h4>
         <ul class="findings-list">
           <li *ngFor="let item of analysisResult()?.findings" class="finding-item">
             <span class="dot" [class.ok]="item.status === 'ok'" [class.warn]="item.status === 'warn'"></span>
             {{ item.text }}
           </li>
         </ul>
      </div>
    </div>

    <div class="evaluation-panel">
      <app-help-level-selector (levelChange)="helpLevel.set($any($event))"></app-help-level-selector>
      <div class="mt-4">
         <app-observation-input (noteSaved)="observation.set($any($event))"></app-observation-input>
      </div>
      <div class="mt-6 text-right">
         <button class="save-result-btn" [disabled]="!canSave()" (click)="finish()">Completar Análisis</button>
      </div>
    </div>
  </div>
</div>
