<aside class="sidebar-container" [class.collapsed]="isCollapsed" [class.mobile-open]="isMobileOpen">
  <div class="sidebar-header">
    <div class="logo-area" title="Sistema Institucional">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
      </div>
      <h1 class="logo-text" *ngIf="!isCollapsed">SIAE</h1>
    </div>
    <button class="toggle-btn" (click)="toggleSidebar()" aria-label="Toggle Sidebar">
      <svg *ngIf="!isCollapsed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="m15 18-6-6 6-6"/></svg>
      <svg *ngIf="isCollapsed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>

  <nav class="sidebar-nav">
    <p class="nav-section-title" *ngIf="!isCollapsed">Navegación</p>
    
    <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" class="nav-item" title="Inicio" (click)="closeMobile()">
      <div class="nav-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <span class="nav-label" *ngIf="!isCollapsed">Inicio</span>
    </a>

    <a routerLink="/perfil" routerLinkActive="active-link" class="nav-item" title="Mi Perfil" (click)="closeMobile()">
      <div class="nav-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span class="nav-label" *ngIf="!isCollapsed">Mi Perfil</span>
    </a>

    <!-- SECCIÓN MAESTRO: Gestión Pedagógica -->
    <div class="nav-divider" *ngIf="authService.hasPermission('GESTION_ACTIVIDADES')"></div>
    <p class="nav-section-title" *ngIf="!isCollapsed && authService.hasPermission('GESTION_ACTIVIDADES')">Gestión Pedagógica</p>

    <a routerLink="/actividades/builder" routerLinkActive="active-link" class="nav-item mvp-master-item" *ngIf="authService.hasPermission('GESTION_ACTIVIDADES')" title="Panel Maestro" (click)="closeMobile()">
      <div class="nav-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon" style="color: #a855f7;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <span class="nav-label" style="font-weight: 700; color: #e9d5ff;" *ngIf="!isCollapsed">Panel Maestro</span>
    </a>

    <a routerLink="/gestion-user" routerLinkActive="active-link" class="nav-item" *ngIf="authService.hasPermission('GESTION_ACTIVIDADES')" title="Gestión de Alumnos" (click)="closeMobile()">
      <div class="nav-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
      </div>
      <span class="nav-label" *ngIf="!isCollapsed">Gestión Alumnos</span>
    </a>

    <!-- Reportes -->
    <a routerLink="/reportes" routerLinkActive="active-link" class="nav-item" *ngIf="authService.hasPermission('REPORTES')" title="Reportes" (click)="closeMobile()">
      <div class="nav-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <span class="nav-label" *ngIf="!isCollapsed">Reportes</span>
    </a>

    <!-- SECCIÓN ALUMNO -->
    <div class="nav-divider" *ngIf="authService.hasPermission('LECTURA_ALUMNO') && !authService.hasPermission('GESTION_ACTIVIDADES')"></div>
    <p class="nav-section-title" *ngIf="!isCollapsed && authService.hasPermission('LECTURA_ALUMNO') && !authService.hasPermission('GESTION_ACTIVIDADES')">Mi Aprendizaje</p>

    <a routerLink="/lecciones" routerLinkActive="active-link" class="nav-item" *ngIf="authService.hasPermission('LECTURA_ALUMNO') && !authService.hasPermission('GESTION_ACTIVIDADES')" title="Mis Lecciones" (click)="closeMobile()">
      <div class="nav-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
      </div>
      <span class="nav-label" *ngIf="!isCollapsed">Mis Lecciones</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-profile" *ngIf="authService.currentUser() as user">
      <img [src]="user.avatarUrl || 'https://api.dicebear.com/7.x/initials/svg?seed=' + user.name + '+' + user.fatherLastName" alt="Avatar de {{user.name}}" class="avatar-img" />
      <div class="user-info" *ngIf="!isCollapsed">
        <span class="user-name">{{ user.name }} {{ user.fatherLastName }}</span>
        <span class="user-role">{{ authService.getRoleName() }}</span>
      </div>
    </div>
    <button class="logout-btn" (click)="logout()" [title]="isCollapsed ? 'Cerrar Sesión' : ''" [class.collapsed]="isCollapsed">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span *ngIf="!isCollapsed">Cerrar Sesión</span>
    </button>
  </div>
</aside>
